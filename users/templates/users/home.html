<h2>Добро пожаловать в SchoolHub!</h2>
{% if user.is_authenticated %}
    <p>Привет, {{ user.username }}!</p>
    <form method="post" action="/accounts/logout/">
        {% csrf_token %}
        <button type="submit">Выйти</button>
    </form>
{% else %}
    <p><a href="/accounts/login/">Войти</a> или <a href="/register/">зарегистрироваться</a></p>
{% endif %}
