<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}SchoolHub{% endblock %}</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, Arial, sans-serif; background: #f5f6f8; color: #1a1a1a; }
        .topbar { background: white; padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; }
        .topbar h1 { font-size: 20px; }
        .topbar-right { display: flex; align-items: center; gap: 12px; }
        .layout { display: flex; max-width: 1100px; margin: 24px auto; gap: 20px; }
        .sidebar { width: 220px; background: white; border-radius: 12px; padding: 16px; height: fit-content; }
        .sidebar a { display: block; padding: 10px 12px; border-radius: 8px; color: #333; text-decoration: none; margin-bottom: 4px; }
        .sidebar a:hover { background: #f0f0f0; }
        .main { flex: 1; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
        .post-author { font-weight: 600; }
        .post-content { margin-top: 8px; color: #333; }
        .avatar-small { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #ddd; display: inline-block; }
        textarea { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; resize: vertical; min-height: 60px; font-family: inherit; }
        button { background: #4a5568; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; margin-top: 8px; }
    </style>
</head>
<body>
<div class="topbar">
    <h1>SchoolHub</h1>
    {% if user.is_authenticated %}
    <div class="topbar-right">
        {{ user.username }}
        <a href="/profile/">
            {% if user.profile.avatar %}
                <img src="{{ user.profile.avatar.url }}" class="avatar-small">
            {% else %}
                <div class="avatar-small"></div>
            {% endif %}
        </a>
        <a href="/accounts/logout/">Выйти</a>
    </div>
    {% endif %}
</div>
<div class="layout">
    {% if user.is_authenticated %}
    <div class="sidebar">
        <a href="/">Главная</a>
        <a href="/feed/">Лента</a>
        <a href="/profile/">Профиль</a>
        <a href="/schedule/">Расписание</a>
        <a href="#">Чат</a>
    </div>
    {% endif %}
    <div class="main">
        {% block content %}
        {% endblock %}
    </div>
</div>
</body>
</html>
