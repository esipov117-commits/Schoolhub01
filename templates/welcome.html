<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchoolHub — Добро пожаловать</title>
<style>
    :root {
        --bg: #f7f7f8;
        --panel: #ffffff;
        --text: #1c1c1f;
        --muted: #8b8f98;
        --border: #eceef1;
        --accent: #006eff;
        --accent-hover: #1d4ed8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
    }

    .topbar {
        background: var(--panel);
        padding: 16px 32px;
        border-bottom: 1px solid var(--border);
    }
    .topbar h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }

    .hero {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 24px;
    }
    .hero h2 {
        font-size: 36px;
        font-weight: 800;
        margin-bottom: 12px;
        letter-spacing: -0.02em;
    }
    .hero p {
        color: var(--muted);
        font-size: 17px;
        max-width: 480px;
        margin-bottom: 32px;
        line-height: 1.6;
    }

    .buttons { display: flex; gap: 12px; }
    .btn {
        padding: 12px 28px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 15px;
        text-decoration: none;
        transition: background 0.15s ease;
    }
    .btn-primary {
        background: var(--accent);
        color: #fff;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-secondary {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg); }

    .features {
        display: flex;
        gap: 20px;
        margin-top: 48px;
        flex-wrap: wrap;
        justify-content: center;
    }
    .feature-card {
        background: var(--panel);
        border-radius: 16px;
        padding: 24px;
        width: 200px;
        text-align: center;
    }
    .feature-card h3 { font-size: 16px; margin-bottom: 6px; }
    .feature-card p { font-size: 13.5px; color: var(--muted); }
</style>
</head>
<body>

<div class="topbar">
    <h1>SchoolHub</h1>
</div>

<div class="hero">
    <h2>Добро пожаловать в SchoolHub</h2>
    <p>Социальная сеть для школьников: лента, чат и календарь событий — всё в одном месте.</p>

    <div class="buttons">
        <a href="{% url 'register' %}" class="btn btn-primary">Присоединиться</a>
    </div>

    <div class="features">
        <div class="feature-card">
            <h3>📰 Лента</h3>
            <p>Делитесь новостями с одноклассниками</p>
        </div>
        <div class="feature-card">
            <h3>💬 Чат</h3>
            <p>Общайтесь в реальном времени</p>
        </div>
        <div class="feature-card">
            <h3>📅 Календарь событий</h3>
            <p>Не пропустите важные даты и мероприятия</p>
        </div>
    </div>
</div>

</body>
</html>
