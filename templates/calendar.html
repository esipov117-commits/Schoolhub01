{% extends "base.html" %}

{% block extra_head %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css" rel="stylesheet">
{% endblock %}

{% block title %}
Календарь | SchoolHub
{% endblock %}

{% block nav_calendar %}
active
{% endblock %}

{% block content %}

<style>

#calendar {
    margin-top: 10px;
}

/* Календарь */

.fc {
    --fc-border-color: transparent;
    --fc-page-bg-color: transparent;
    --fc-neutral-bg-color: transparent;

    font-family:
    -apple-system,
    BlinkMacSystemFont,
    "SF Pro Display",
    sans-serif;
}

.fc .fc-toolbar-title {

    font-size:24px;
    font-weight:700;
    letter-spacing:-0.03em;

}

.fc .fc-button {

    background:var(--bg);
    color:var(--text);
    border:none;
    border-radius:14px;
    font-weight:600;
    box-shadow:none;

}

.fc .fc-button:hover {

    background:var(--sidebar-active-bg);

}

.fc .fc-button-primary:not(:disabled).fc-button-active {

    background:var(--accent);
    color:white;

}

.fc .fc-col-header-cell {

    padding:12px 0;

}

.fc .fc-col-header-cell-cushion {

    color:var(--muted);
    font-size:13px;
    font-weight:600;
    text-decoration:none;

}

.fc-daygrid-day-number {

    color:var(--text);
    font-weight:600;
    padding:8px;
    text-decoration:none;

}

.fc-day-today {

    background:rgba(37,99,235,0.08)!important;
    border-radius:16px;

}

.fc-event {

    border:none!important;
    border-radius:10px!important;
    padding:4px 8px!important;
    font-size:13px!important;
    font-weight:600!important;

}

.fc-scrollgrid,
.fc-scrollgrid td,
.fc-scrollgrid th {

    border:none!important;

}

/* Модальное окно */

#event-form {

    backdrop-filter:blur(10px);

}

#event-form .card {

    animation:popup .25s ease;

}

@keyframes popup {

    from {

        transform:scale(.95);
        opacity:0;

    }

    to {

        transform:scale(1);
        opacity:1;

    }

}

/* Мобильная версия */

@media(max-width:760px){

.card {

    padding:16px!important;
    border-radius:22px!important;

}

.fc .fc-toolbar {

    flex-direction:column;
    gap:12px;

}

.fc .fc-toolbar-title {

    font-size:20px;

}

.fc .fc-button {

    font-size:13px;
    padding:8px 12px;

}

.fc-event {

    font-size:11px!important;
    border-radius:8px!important;

}

.fc-daygrid-day-number {

    font-size:13px;

}

#event-form .card {

    width:calc(100% - 32px)!important;

}

}

@media(max-width:760px){

    #calendar {

        width:100%;
        min-height:450px;

    }


    .fc-view-harness {

        min-height:450px;

    }


    .fc-scrollgrid {

        width:100%!important;

    }


}

</style>

<div class="card"
style="
padding:24px;
border-radius:24px;
">

<div class="card-header">

<div class="card-title">
📅 Мой календарь
</div>

<button 
onclick="openEventForm()"
style="
width:42px;
height:42px;
border-radius:50%;
border:none;
background:var(--accent);
color:white;
font-size:26px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
">
+
</button>

</div>

<div id="calendar"></div>

</div>

<!-- СОЗДАНИЕ СОБЫТИЯ -->

<div 
id="event-form"
style="
display:none;
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,.35);
z-index:100;
align-items:center;
justify-content:center;
">

<div class="card"
style="
width:420px;
max-width:90%;
">

<div class="card-header">

<div class="card-title">
Новое событие
</div>

<button 
onclick="closeEventForm()"
style="
background:none;
border:none;
font-size:24px;
cursor:pointer;
color:var(--text);
">
×
</button>

</div>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button class="btn-primary">
Создать
</button>

</form>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>


<script>


function openEventForm(){

    document.getElementById("event-form").style.display="flex";

}



function closeEventForm(){

    document.getElementById("event-form").style.display="none";

}





document.addEventListener(
"DOMContentLoaded",
function(){


    let calendarEl = document.getElementById("calendar");


    if (!calendarEl) {
        return;
    }



    let mobile = window.innerWidth <= 760;



    let calendar = new FullCalendar.Calendar(
        calendarEl,
        {


        initialView:"dayGridMonth",


        locale:"ru",


        height: mobile ? 520 : 700,


        expandRows:true,


        dayMaxEvents:true,


        eventDisplay:"block",



        headerToolbar: mobile ? {


            left:"prev,next",

            center:"title",

            right:"today"


        } : {


            left:"prev,next today",

            center:"title",

            right:"dayGridMonth,timeGridWeek,listWeek"


        },




        events:[


        {% for event in events %}


        {


            title:"{{ event.title|escapejs }}",


            start:
            "{{ event.date|date:'Y-m-d' }}{% if event.start_time %}T{{ event.start_time|time:'H:i' }}{% endif %}",


            color:"{{ event.color }}"


        },


        {% endfor %}



        ]



        });



        calendar.render();



        // фикс отображения на мобильных
        setTimeout(function(){

            calendar.updateSize();

        },300);




        window.addEventListener(
        "resize",
        function(){

            calendar.updateSize();

        });



});



</script>


{% endblock %}
