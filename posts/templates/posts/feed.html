{% extends "base.html" %}
{% block title %}Лента — SchoolHub{% endblock %}

{% block content %}
    <h2 style="margin-bottom: 16px;">Лента</h2>

    {% for post in posts %}
    <div class="card">
        <span class="post-author">{{ post.author.username }}</span>
        <span style="color:#888; font-size:13px; margin-left:6px;">{{ post.created_at }}</span>
        <div class="post-content">{{ post.content }}</div>
    </div>
    {% empty %}
    <div class="card">Пока постов нет. Напишите первый!</div>
    {% endfor %}

    <div class="card">
        <form method="POST">
            {% csrf_token %}
            <textarea name="content" placeholder="Что нового?"></textarea>
            <br>
            <button type="submit">Опубликовать</button>
        </form>
    </div>
{% endblock %}
