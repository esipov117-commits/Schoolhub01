{% extends 'base.html' %}

{% block title %}Редактировать событие{% endblock %}
{% block nav_events %}active{% endblock %}

{% block content %}
<div class="card event-form-card">
    <h2 style="margin-bottom: 4px;">Редактировать событие</h2>
    <p class="event-form-sub">Измени детали и сохрани</p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="field-group">
            <label class="field-label" for="id_title">Название</label>
            <input type="text" id="id_title" name="title" value="{{ event.title }}" required>
        </div>

        <div class="field-group">
            <label class="field-label" for="id_description">Описание</label>
            <textarea id="id_description" name="description">{{ event.description }}</textarea>
        </div>

        <div class="field-group">
            <label class="field-label" for="id_date">Дата и время</label>
            <input type="datetime-local" id="id_date" name="date"
                   value="{{ event.date|date:'Y-m-d\TH:i' }}" required>
        </div>

        <div class="field-group">
            <label class="field-label" for="id_location">Место</label>
            <input type="text" id="id_location" name="location" value="{{ event.location }}">
        </div>

        <div class="field-group">
            <label class="field-label" for="id_image">Фото / афиша</label>
            <div id="imagePreviewBox" style="{% if not event.image %}display:none;{% endif %} margin-bottom:10px;">
                <img id="imagePreview" src="{% if event.image %}{{ event.image.url }}{% endif %}"
                     style="max-width:100%; border-radius:12px; display:block;">
            </div>
            <label class="upload-btn">
                🖼 {% if event.image %}Заменить фото{% else %}Загрузить фото{% endif %}
                <input type="file" id="id_image" name="image" accept="image/*" style="display:none;" onchange="previewEventImage(this)">
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Сохранить</button>
            <a href="{% url 'events_list' %}" class="btn-secondary">Отмена</a>
        </div>
    </form>
</div>

<style>
    .event-form-card { max-width: 520px; }
    .event-form-sub { color: var(--muted); font-size: 13.5px; margin-bottom: 22px; }
    .field-group { margin-bottom: 18px; }
    .field-label { display: block; font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
    .form-actions { display: flex; gap: 10px; margin-top: 6px; }
    .btn-secondary {
        background: var(--bg);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 10px 20px;
        border-radius: 10px;
        font-weight: 700;
        font-size: 14px;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        font-family: inherit;
    }
    .upload-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--bg);
        border: 1px solid var(--border);
        color: var(--text);
        padding: 9px 14px;
        border-radius: 10px;
        font-size: 13.5px;
        font-weight: 600;
        cursor: pointer;
    }
    .upload-btn:hover { background: var(--sidebar-active-bg); }
</style>

<script>
    function previewEventImage(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            document.getElementById('imagePreview').src = e.target.result;
            document.getElementById('imagePreviewBox').style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
</script>
{% endblock %}
